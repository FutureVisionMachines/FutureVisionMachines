{% extends "admin/base.html" %}

{% block title %}Admin Login{% endblock %}

{% block content %}
<div class="admin-login-wrapper">
    <div class="admin-login-card glass-panel">
        <div class="login-header">
            <h1>FutureVisionMachines</h1>
            <p>Admin Panel</p>
        </div>
        
        <form action="{{ url_for('admin.login') }}" method="POST" class="login-form">
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required class="form-input" autofocus>
            </div>
            
            <button type="submit" class="btn-primary btn-block">Login</button>
        </form>
    </div>
</div>
{% endblock %}
