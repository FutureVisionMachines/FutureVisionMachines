services:
  # Web Service
  - type: web
    name: futurevisionmachines-website
    env: python
    region: oregon
    plan: free
    branch: master
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn 'app:create_app(\"production\")'"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: SECRET_KEY
        generateValue: true
      - key: FLASK_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: futurevisionmachines-db
          property: connectionString
      - key: ADMIN_PASSWORD
        sync: false
      - key: MAIL_SERVER
        value: mail.smtp2go.com
      - key: MAIL_PORT
        value: 2525
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
      - key: MAIL_DEFAULT_SENDER
        value: info@futurevisionmachines.com
      - key: COMPANY_EMAIL
        value: info@futurevisionmachines.com

databases:
  - name: futurevisionmachines-db
    databaseName: fvm
    user: fvm_user
    region: oregon
    plan: free
